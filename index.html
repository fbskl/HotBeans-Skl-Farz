<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hot Beans Web – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000000; /* black background */
      color: #ffffff; /* white text */
    }

    /* NAVBAR */
    .navbar {
      width: 100%;
      background-color: #000000;
      padding: 15px 0;
      border-bottom: 1px solid #222222;
    }

    .nav-content {
      width: 90%;
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* LOGO AREA */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden; /* allows image to fit inside */
      background-color: #ffffff; /* white background for logo */
    }

    .logo-circle img {
	width: 100%;
	height: 100%;
	object-fit: cover; /* makes your image fit perfectly */
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
    }

    .nav-links a {
      margin-left: 15px;
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: #e63946; /* red hover */
    }

    /* HERO SECTION */
    .hero {
      width: 90%;
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }

    .hero-text {
      flex: 1;
      min-width: 260px;
    }

    .hero-title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .hero-subtitle {
      color: #cccccc;
      margin-bottom: 20px;
      max-width: 450px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      border-radius: 5px;
      font-size: 0.95rem;
    }

    .btn-primary {
      background-color: #e63946; /* red button */
      color: white;
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid #e63946;
      color: #e63946;
    }

    /* HERO IMAGE BOX */
    .hero-box {
      flex: 1;
      min-width: 260px;
      background-color: #111111;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #222222;
    }

    .hero-box img {
	width: 100%;
	border-radius: 8px;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px 0;
      margin-top: 40px;
      color: #888888;
      font-size: 0.9rem;
      border-top: 1px solid #222222;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-content">

      <div class="logo-area">
        <div class="logo-circle">
          <!-- INSERT YOUR LOGO IMAGE HERE -->
          <img src="images/beanielogord.png" alt="Logo" width="125%" height="125%">
        </div>
        <div class="logo-text">Hot Beans Web</div>
      </div>

      <div class="nav-links">
        <a href="company.html">Company</a>
        <a href="trainees.html">Trainees</a>
        <a href="jobs.html">Jobs</a>
        <a href="courses.html">Courses</a>
        <a href="apply.html">Apply</a>
      </div>

    </div>
  </div>

  <!-- HERO SECTION -->
  <div class="hero">
    <div class="hero-text">
      <div class="hero-title">Start Your Web Development Career</div>

      <div class="hero-subtitle">
        Hot Beans Web helps new developers gain real experience, build real projects, and begin their journey into the tech industry.
      </div>

      <button class="btn btn-primary" onclick="location.href='apply.html'">Apply Now</button>
      <button class="btn btn-secondary" onclick="location.href='company.html'">Learn More</button>
    </div>

    <div class="hero-box">
      <img src="https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Developers working" width="97%" height="1023">
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © Hot Beans Web — Careers for aspiring web developers
  </div>

</body>
</html>
